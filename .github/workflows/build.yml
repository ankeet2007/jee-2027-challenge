name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Generate Android project files
        run: |
          flutter create --project-name jee_challenge --org com.jee2027 --platforms android /tmp/scaffold
          cp -r /tmp/scaffold/android ./android
          cp -r /tmp/scaffold/test ./test 2>/dev/null || true

      - name: Set app name in AndroidManifest
        run: |
          sed -i 's/android:label="jee_challenge"/android:label="JEE 2027 Challenge"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK (arm64 - for most phones and tablets)
        uses: actions/upload-artifact@v4
        with:
          name: JEE-2027-Challenge-APK
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload APK (universal - works on all devices)
        uses: actions/upload-artifact@v4
        with:
          name: JEE-2027-Challenge-APK-universal
          path: build/app/outputs/flutter-apk/
          retention-days: 30
